x-app: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: web
  volumes:
    - app-storage:/var/www/html/storage
  environment:
    - APP_NAME=${APP_NAME:-TradingBot}
    - APP_ENV=${APP_ENV:-production}
    - APP_KEY=${APP_KEY}
    - APP_DEBUG=${APP_DEBUG:-false}
    - APP_URL=${APP_URL}
    - PHP_CLI_SERVER_WORKERS=4
    - BCRYPT_ROUNDS=12
    - LOG_CHANNEL=stack
    - LOG_STACK=single
    - LOG_LEVEL=${LOG_LEVEL:-warning}
    - DB_CONNECTION=mysql
    - DB_HOST=tradingbot-mysql
    - DB_PORT=3306
    - DB_DATABASE=${DB_DATABASE:-tradingbot}
    - DB_USERNAME=${DB_USERNAME:-tradingbot}
    - DB_PASSWORD=${DB_PASSWORD}
    - SESSION_DRIVER=database
    - SESSION_LIFETIME=120
    - BROADCAST_CONNECTION=log
    - FILESYSTEM_DISK=local
    - QUEUE_CONNECTION=redis
    - CACHE_STORE=redis
    - REDIS_CLIENT=phpredis
    - REDIS_HOST=tradingbot-redis
    - REDIS_PORT=6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - AI_URL=${AI_URL}
    - AI_MODEL=${AI_MODEL}
    - AI_API_KEY=${AI_API_KEY}
    - CONTAINER_ROLE=app
  depends_on:
    tradingbot-mysql:
      condition: service_healthy
    tradingbot-redis:
      condition: service_healthy
  restart: always

services:
  tradingbot-app:
    <<: *app-base
    ports:
      - "${EXTERNAL_PORT:-8100}:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingbot-app.rule=Host(`${TRAEFIK_DOMAIN:-tradingbot.localhost}`)"
      - "traefik.http.routers.tradingbot-app.entrypoints=web"
      - "traefik.http.services.tradingbot-app.loadbalancer.server.port=8000"

  tradingbot-horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: horizon
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      - CONTAINER_ROLE=horizon
      - APP_KEY=${APP_KEY}
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=mysql
      - DB_HOST=tradingbot-mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-tradingbot}
      - DB_USERNAME=${DB_USERNAME:-tradingbot}
      - DB_PASSWORD=${DB_PASSWORD}
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=tradingbot-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - AI_URL=${AI_URL}
      - AI_MODEL=${AI_MODEL}
      - AI_API_KEY=${AI_API_KEY}
    depends_on:
      tradingbot-mysql:
        condition: service_healthy
      tradingbot-redis:
        condition: service_healthy
    restart: always

  tradingbot-mysql:
    image: mysql:8.0
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-tradingbot}
      - MYSQL_USER=${DB_USERNAME:-tradingbot}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradingbot-redis:
    image: redis:alpine
    restart: always
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: >
        sh -c "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-storage:
  mysql-data:
  redis-data:
