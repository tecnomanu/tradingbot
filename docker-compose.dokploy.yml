services:
  tradingbot-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    volumes:
      - app-storage:/var/www/html/storage
    ports:
      - "${EXTERNAL_PORT:-8100}:8000"
    environment:
      - CONTAINER_ROLE=app
      - DB_HOST=tradingbot-mysql
      - REDIS_HOST=tradingbot-redis
    networks:
      - tradingbot-net
    depends_on:
      tradingbot-mysql:
        condition: service_healthy
      tradingbot-redis:
        condition: service_healthy
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradingbot-app.rule=Host(`${TRAEFIK_DOMAIN:-tradingbot.localhost}`)"
      - "traefik.http.routers.tradingbot-app.entrypoints=web"
      - "traefik.http.services.tradingbot-app.loadbalancer.server.port=8000"

  tradingbot-horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: horizon
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      - CONTAINER_ROLE=horizon
      - DB_HOST=tradingbot-mysql
      - REDIS_HOST=tradingbot-redis
    networks:
      - tradingbot-net
    depends_on:
      tradingbot-mysql:
        condition: service_healthy
      tradingbot-redis:
        condition: service_healthy
    restart: always

  tradingbot-mysql:
    image: mysql:8.0
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-tradingbot}
      - MYSQL_USER=${DB_USERNAME:-tradingbot}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    networks:
      - tradingbot-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradingbot-redis:
    image: redis:alpine
    restart: always
    command: sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    networks:
      - tradingbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tradingbot-net:
    driver: bridge

volumes:
  app-storage:
  mysql-data:
  redis-data:
