version: "3.8"

x-app: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: web
  volumes:
    - app-storage:/var/www/html/storage
  environment:
    - APP_NAME=${APP_NAME:-TradingBot}
    - APP_ENV=${APP_ENV:-production}
    - APP_KEY=${APP_KEY}
    - APP_DEBUG=${APP_DEBUG:-false}
    - APP_URL=${APP_URL}
    - PHP_CLI_SERVER_WORKERS=4
    - BCRYPT_ROUNDS=12
    - LOG_CHANNEL=stack
    - LOG_STACK=single
    - LOG_LEVEL=${LOG_LEVEL:-warning}
    - DB_CONNECTION=${DB_CONNECTION:-pgsql}
    - DB_HOST=${DB_HOST:-tradingbot-postgres}
    - DB_PORT=${DB_PORT:-5432}
    - DB_DATABASE=${DB_DATABASE:-tradingbot}
    - DB_USERNAME=${DB_USERNAME:-tradingbot}
    - DB_PASSWORD=${DB_PASSWORD}
    - SESSION_DRIVER=database
    - SESSION_LIFETIME=120
    - BROADCAST_CONNECTION=log
    - FILESYSTEM_DISK=local
    - QUEUE_CONNECTION=redis
    - CACHE_STORE=redis
    - REDIS_CLIENT=${REDIS_CLIENT:-phpredis}
    - REDIS_HOST=${REDIS_HOST:-tradingbot-redis}
    - REDIS_PORT=${REDIS_PORT:-6379}
    - REDIS_USERNAME=${REDIS_USERNAME:-null}
    - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
    - AI_URL=${AI_URL}
    - AI_MODEL=${AI_MODEL}
    - AI_API_KEY=${AI_API_KEY}
  restart: always

services:
  tradingbot-app:
    <<: *app-base
    depends_on:
      tradingbot-postgres:
        condition: service_healthy
      tradingbot-redis:
        condition: service_healthy

  tradingbot-horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: horizon
    volumes:
      - app-storage:/var/www/html/storage
    restart: always
    entrypoint: []
    command: ["php", "artisan", "horizon"]
    depends_on:
      tradingbot-postgres:
        condition: service_healthy
      tradingbot-redis:
        condition: service_healthy

